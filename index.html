<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STF SOG14 OSINT</title>
    <style>
        :root {
            --bg-color: #060a13;
            --panel-bg: #0f172a;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-red: #f43f5e;
            --success-green: #10b981;
            
            /* DB-1 Specific Color Spaces */
            --db1-blue: #38bdf8;
            --db1-glow: rgba(56, 189, 248, 0.15);
            
            /* DB-2 Specific Color Spaces */
            --db2-green: #10b981;
            --db2-glow: rgba(16, 185, 129, 0.15);
        }

        body {
            font-family: 'Courier New', Courier, monospace, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 600px;
            position: relative;
            overflow: hidden;
        }

        /* Top decorative scanner lines */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--db1-blue), var(--db2-green), transparent);
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            text-align: center;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background-color: #020617;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: var(--db1-blue);
            box-shadow: 0 0 12px var(--db1-glow);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(3, 105, 161, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #0369a1, #075985);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .loading {
            text-align: center;
            display: none;
            color: var(--db1-blue);
            margin-top: 20px;
            font-size: 13px;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .result-box {
            margin-top: 30px;
            display: none;
        }

        /* Server Core Blocks styling separation rules */
        .server-section {
            margin-bottom: 25px;
            padding: 20px;
            border-radius: 12px;
            background: #090f1c;
        }

        .server-section.db1-theme {
            border: 1px solid rgba(56, 189, 248, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 0 15px var(--db1-glow);
        }

        .server-section.db2-theme {
            border: 1px solid rgba(16, 185, 129, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2), inset 0 0 15px var(--db2-glow);
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            font-weight: bold;
        }

        .db1-theme .server-header {
            color: var(--db1-blue);
            border-bottom: 1px dashed rgba(56, 189, 248, 0.2);
        }

        .db2-theme .server-header {
            color: var(--db2-green);
            border-bottom: 1px dashed rgba(16, 185, 129, 0.2);
        }

        .records-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .record-card {
            background: #030712;
            border-radius: 8px;
            padding: 14px;
        }
        
        .db1-theme .record-card { border: 1px solid #1e293b; }
        .db2-theme .record-card { border: 1px solid #14231c; }

        .record-title {
            font-size: 11px;
            margin-bottom: 12px;
            font-weight: bold;
            padding-left: 8px;
        }
        
        .db1-theme .record-title { border-left: 3px solid var(--db1-blue); color: var(--db1-blue); }
        .db2-theme .record-title { border-left: 3px solid var(--db2-green); color: var(--db2-green); }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px solid #111827;
            padding-bottom: 6px;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .telecom-meta-block {
            background-color: #090f1c;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 10px 12px;
            margin-top: 12px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px dashed #030712;
        }

        .meta-row:last-child {
            border-bottom: none;
        }

        .meta-label {
            color: var(--text-muted);
        }

        .meta-val {
            color: #ffffff;
            font-weight: bold;
            text-align: right;
            word-break: break-all;
        }

        .label-with-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .label-with-icon svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .db1-theme .label-with-icon svg { stroke: var(--db1-blue); }
        .db2-theme .label-with-icon svg { stroke: var(--db2-green); }

        .result-item span.res-value {
            color: #ffffff;
            font-weight: bold;
            text-align: right;
            word-break: break-word;
            padding-left: 15px;
        }

        .inner-error {
            font-size: 13px;
            text-align: center;
            padding: 10px;
            color: var(--text-muted);
        }

        .error-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(244, 63, 94, 0.1);
            color: var(--error-red);
            border: 1px solid rgba(244, 63, 94, 0.3);
            display: none;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>STF SOG14 OSINT</h1>
    <p class="subtitle">Dual-Routing Intelligence Hub</p>
    
    <div class="input-group">
        <input type="text" id="phoneNumber" placeholder="Enter 10-digit mobile number" onkeydown="handleKeyPress(event)">
    </div>
    <button onclick="performLookup()">Execute Dual Query</button>

    <div id="loadingText" class="loading">> PINNING TELEMETRY MATRICES... FETCHING LIVE STREAMS...</div>
    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
        
        <div class="server-section db1-theme">
            <div class="server-header">
                <span>[CORE_A] DB-1: TRUE CALL MATRIX</span>
                <span id="timeDb1" style="color: var(--text-muted);">--</span>
            </div>
            <div id="db1Wrapper" class="records-container"></div>
        </div>

        <div class="server-section db2-theme">
            <div class="server-header">
                <span>[CORE_B] DB-2: SHERLOCK ENGINE</span>
                <span id="timeDb2" style="color: var(--text-muted);">--</span>
            </div>
            <div id="db2Wrapper" class="records-container"></div>
        </div>

    </div>
</div>

<script>
function handleKeyPress(event) {
    if (event.key === "Enter") {
        performLookup();
    }
}

async function performLookup() {
    let rawInput = document.getElementById('phoneNumber').value;
    const loadingText = document.getElementById('loadingText');
    const resultBox = document.getElementById('resultBox');
    const errorBox = document.getElementById('errorBox');
    
    const db1Wrapper = document.getElementById('db1Wrapper');
    const db2Wrapper = document.getElementById('db2Wrapper');

    resultBox.style.display = 'none';
    errorBox.style.display = 'none';
    db1Wrapper.innerHTML = ''; 
    db2Wrapper.innerHTML = '';
    document.getElementById('timeDb1').innerText = '--';
    document.getElementById('timeDb2').innerText = '--';

    let digitsOnly = rawInput.replace(/\D/g, '');

    if (digitsOnly.length === 12 && digitsOnly.startsWith('91')) {
        digitsOnly = digitsOnly.substring(2);
    } else if (digitsOnly.length === 11 && digitsOnly.startsWith('0')) {
        digitsOnly = digitsOnly.substring(1);
    }

    if (digitsOnly.length !== 10) {
        errorBox.innerText = `CRITICAL CONFIG FAULT:\nInput must resolve to exactly 10 digits.\nDetected: ${digitsOnly.length} digits.`;
        errorBox.style.display = 'block';
        return;
    }

    loadingText.style.display = 'block';

    const query10Digit = digitsOnly;
    const queryWithCountryCode = '+91' + digitsOnly;

    const urlDb1 = `https://true-call-check.vercel.app/api/truecallcheckApi?IndNum=${query10Digit}`;
    const urlDb2 = `https://api-developers-sherlock-osint.sherlock-dev.workers.dev/api/number`;

    const startDb1 = performance.now();
    const fetchDb1 = fetch(urlDb1).then(async r => {
        const elapsed = (performance.now() - startDb1).toFixed(0);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        return { data: await r.json(), time: elapsed };
    });

    const startDb2 = performance.now();
    const fetchDb2 = fetch(urlDb2, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'User-Agent': 'Mozilla/5.0' },
        body: JSON.stringify({ number: queryWithCountryCode })
    }).then(async r => {
        const elapsed = (performance.now() - startDb2).toFixed(0);
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        return { data: await r.json(), time: elapsed };
    });

    const results = await Promise.allSettled([fetchDb1, fetchDb2]);
    loadingText.style.display = 'none';
    resultBox.style.display = 'block';

    // --- PARSE CORE A (TRUE CALL DB) ---
    const resDb1 = results[0];
    if (resDb1.status === "fulfilled") {
        document.getElementById('timeDb1').innerText = `[${resDb1.value.time}ms]`;
        const rawResponse = resDb1.value.data;

        if (rawResponse && rawResponse.data && Array.isArray(rawResponse.data) && rawResponse.data.length > 0) {
            rawResponse.data.forEach((record, index) => {
                const card = document.createElement('div');
                card.className = 'record-card';
                
                let operatorName = 'N/A';
                let circleName = record.circle || 'N/A';
                if (record.circle && record.circle.includes(';')) {
                    const parts = record.circle.split(';');
                    operatorName = parts[0] || 'N/A';
                    circleName = parts[1] || 'N/A';
                }

                card.innerHTML = `
                    <div class="record-title">[PROFILE_ENTRY_0${index + 1}]</div>
                    <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><strong>Full Name:</strong></div><span class="res-value">${record.name || 'NOT_DECLARED'}</span></div>
                    <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><strong>Father Name:</strong></div><span class="res-value">${record.father_name || 'N/A'}</span></div>
                    <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg><strong>Mobile:</strong></div><span class="res-value">${record.mobile || 'N/A'}</span></div>
                    <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"></path><circle cx="12" cy="10" r="3"></circle></svg><strong>Address:</strong></div><span class="res-value">${record.address || 'N/A'}</span></div>
                    
                    <div class="telecom-meta-block">
                        <div class="meta-row"><span class="meta-label">Operator:</span><span class="meta-val">${operatorName}</span></div>
                        <div class="meta-row"><span class="meta-label">Circle:</span><span class="meta-val">${circleName}</span></div>
                        <div class="meta-row"><span class="meta-label">Document No:</span><span class="meta-val">${record.DocumentNumber || 'N/A'}</span></div>
                        <div class="meta-row"><span class="meta-label">Email:</span><span class="meta-val" style="text-transform:lowercase;">${record.email || 'N/A'}</span></div>
                        <div class="meta-row"><span class="meta-label">Alt Num 1:</span><span class="meta-val">${record.alt_mobile || 'N/A'}</span></div>
                        <div class="meta-row"><span class="meta-label">Alt Num 2:</span><span class="meta-val">${record.alt_mobile2 || 'N/A'}</span></div>
                        <div class="meta-row"><span class="meta-label">Alt Num 3:</span><span class="meta-val">${record.alt_mobile3 || 'N/A'}</span></div>
                        <div class="meta-row"><span class="meta-label">Alt Num 4:</span><span class="meta-val">${record.alt_mobile4 || 'N/A'}</span></div>
                    </div>
                `;
                db1Wrapper.appendChild(card);
            });
            
            // Filtered notice script validation checker block
            if(rawResponse.notice && !rawResponse.notice.includes("@TheAdvanceBots")) {
                const noticeDiv = document.createElement('div');
                noticeDiv.className = 'system-notice';
                noticeDiv.innerHTML = `<strong>NOTICE:</strong> ${rawResponse.notice}`;
                db1Wrapper.appendChild(noticeDiv);
            }
        } else {
            db1Wrapper.innerHTML = '<div class="inner-error">> No matching records registered in Core Alpha database.</div>';
        }
    } else {
        db1Wrapper.innerHTML = `<div class="inner-error" style="color:var(--error-red);">CORE_A SYSTEM FAULT: ${resDb1.reason.message}</div>`;
    }

    // --- PARSE CORE B (SHERLOCK ENGINE) ---
    const resDb2 = results[1];
    if (resDb2.status === "fulfilled") {
        document.getElementById('timeDb2').innerText = `[${resDb2.value.time}ms]`;
        const r2 = resDb2.value.data;

        if (r2 && r2.success && r2.data) {
            const d = r2.data;
            const social = d.social || {};
            const card = document.createElement('div');
            card.className = 'record-card';
            card.innerHTML = `
                <div class="record-title">[OSINT_INDEX_SIGNATURE]</div>
                <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><strong>ID Name:</strong></div><span class="res-value">${d.name || 'UNKNOWN'}</span></div>
                <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"></path></svg><strong>Location:</strong></div><span class="res-value">${d.location || 'N/A'} (${d.country || 'N/A'})</span></div>
                <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M2 22h20M2 17h20M2 12h20M2 7h20"></path></svg><strong>Carrier:</strong></div><span class="res-value">${d.carrier || 'N/A'}</span></div>
                <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M12 22v-9M9 15l3-3 3 3"></path></svg><strong>Spam Flag:</strong></div><span class="res-value">${d.is_spam ? '<span style="color:var(--error-red);">🚨 SPAM RISK</span>' : '<span style="color:var(--db2-green);">✅ CLEAR</span>'}</span></div>
                <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><strong>WhatsApp:</strong></div><span class="res-value">${social.whatsapp ? '<span style="color:var(--db2-green);">ACTIVE</span>' : '<span style="color:var(--error-red);">INACTIVE</span>'}</span></div>
                <div class="result-item"><div class="label-with-icon"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg><strong>Telegram:</strong></div><span class="res-value">${social.telegram ? '<span style="color:var(--db2-green);">ACTIVE</span>' : '<span style="color:var(--error-red);">INACTIVE</span>'}</span></div>
            `;
            db2Wrapper.appendChild(card);
        } else {
            db2Wrapper.innerHTML = '<div class="inner-error">> No matching signatures logged in Core Beta cluster.</div>';
        }
    } else {
        db2Wrapper.innerHTML = `<div class="inner-error" style="color:var(--error-red);">CORE_B SYSTEM FAULT: ${resDb2.reason.message}</div>`;
    }
}
</script>

</body>
</html>
