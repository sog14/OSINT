<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STF SOG14 OSINT</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-bg: #111827;
            --accent-blue: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --error-red: #ef4444;
            --success-green: #10b981;
        }

        body {
            font-family: 'Courier New', Courier, monospace, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-blue), transparent);
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            text-align: center;
            color: var(--accent-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background-color: #030712;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #0284c7, #0369a1);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(3, 105, 161, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #0369a1, #075985);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .loading {
            text-align: center;
            display: none;
            color: var(--accent-blue);
            margin-top: 20px;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background: #070a13;
            border: 1px solid rgba(56, 189, 248, 0.3);
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.2);
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            border-bottom: 1px solid #111827;
            padding-bottom: 8px;
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .label-with-icon {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        .label-with-icon svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .result-item span.res-value {
            color: #ffffff;
            font-weight: bold;
            text-align: right;
        }

        .error-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: none;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>STF SOG14 OSINT</h1>
    <p class="subtitle">Target Intelligence Database</p>
    
    <div class="input-group">
        <input type="text" id="phoneNumber" placeholder="Enter number (gaps auto-fixed)" onkeydown="handleKeyPress(event)">
    </div>
    <button onclick="performLookup()">Execute Query</button>

    <div id="loadingText" class="loading">> RUNNING SANITIZATION & FETCHING DATA...</div>
    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
        <div class="result-header">
            <span>// INTEL RECOVERY SUCCESSFUL</span>
            <!-- Execution Timer Target UI Element -->
            <span id="executionTime" style="color: var(--text-muted);"></span>
        </div>
        
        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <strong>Target Name:</strong>
            </div>
            <span id="resName" class="res-value"></span>
        </div>

        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                <strong>Int. Format:</strong>
            </div>
            <span id="resFormat" class="res-value"></span>
        </div>

        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                <strong>Location:</strong>
            </div>
            <span id="resCountry" class="res-value"></span>
        </div>

        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.58 16.11a6 6 0 0 1 6.83 0"></path><line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"></line></svg>
                <strong>Carrier Network:</strong>
            </div>
            <span id="resCarrier" class="res-value"></span>
        </div>

        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                <strong>Spam Flag:</strong>
            </div>
            <span id="resSpam" class="res-value"></span>
        </div>

        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                <strong>WhatsApp Node:</strong>
            </div>
            <span id="resWhatsapp" class="res-value"></span>
        </div>

        <div class="result-item">
            <div class="label-with-icon">
                <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                <strong>Telegram Node:</strong>
            </div>
            <span id="resTelegram" class="res-value"></span>
        </div>
    </div>
</div>

<script>
function handleKeyPress(event) {
    if (event.key === "Enter") {
        performLookup();
    }
}

async function performLookup() {
    let numberInput = document.getElementById('phoneNumber').value;
    const loadingText = document.getElementById('loadingText');
    const resultBox = document.getElementById('resultBox');
    const errorBox = document.getElementById('errorBox');

    resultBox.style.display = 'none';
    errorBox.style.display = 'none';

    numberInput = numberInput.replace(/[\s\-\(\)]/g, '');

    if (!numberInput) {
        errorBox.innerText = "CRITICAL: Target parameter missing.";
        errorBox.style.display = 'block';
        return;
    }

    if (/^\d{10}$/.test(numberInput)) {
        numberInput = '91' + numberInput;
    }
    
    if (!numberInput.startsWith('+')) {
        numberInput = '+' + numberInput;
    }

    loadingText.style.display = 'block';

    // Start benchmark clock right before network call
    const startTime = performance.now();

    const url = "https://api-developers-sherlock-osint.sherlock-dev.workers.dev/api/number";
    
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'
            },
            body: JSON.stringify({ number: numberInput })
        });

        const r = await response.json();
        loadingText.style.display = 'none';

        if (r && r.success) {
            const d = r.data;
            const social = d.social || {};

            document.getElementById('resName').innerText = d.name || 'UNKNOWN_IDENTITY';
            document.getElementById('resFormat').innerText = d.international_format || 'N/A';
            document.getElementById('resCountry').innerText = `${d.location || 'N/A'} (${d.country || 'N/A'})`;
            document.getElementById('resCarrier').innerText = d.carrier || 'N/A';
            
            document.getElementById('resSpam').innerHTML = d.is_spam ? '<span style="color:#ef4444;">🚨 TRUE (HIGH RISK)</span>' : '<span style="color:#10b981;">✅ CLEAR</span>';
            document.getElementById('resWhatsapp').innerHTML = social.whatsapp ? '<span style="color:#10b981;">ACTIVE</span>' : '<span style="color:#ef4444;">INACTIVE</span>';
            document.getElementById('resTelegram').innerHTML = social.telegram ? '<span style="color:#10b981;">ACTIVE</span>' : '<span style="color:#ef4444;">INACTIVE</span>';

            // Calculate total execution latency delta
            const endTime = performance.now();
            const timeTaken = (endTime - startTime).toFixed(0); // Rounded to nearest millisecond
            document.getElementById('executionTime').innerText = `[${timeTaken}ms]`;

            resultBox.style.display = 'block';
        } else {
            errorBox.innerText = "ERROR: No records matching signature found.";
            errorBox.style.display = 'block';
        }
    } catch (error) {
        loadingText.style.display = 'none';
        errorBox.innerText = "NETWORK ERROR: Connection to terminal refused.";
        errorBox.style.display = 'block';
        console.error(error);
    }
}
</script>

</body>
</html>
